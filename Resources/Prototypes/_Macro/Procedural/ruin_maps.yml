# Ruin maps that can be used for salvage magnet ruin offerings.
# These maps are used to extract floor and wall tiles using flood-fill.
# Recommended to keep the total number of maps under 4. Make sure the maps selected are mostly station-like
# Avoid any stations that have large amounts of asteroid walls or xeno-walls. The ruin system was not designed to parse those types of maps.

- type: ruinMap
  id: Bagel
  mapPath: /Maps/bagel.yml

- type: ruinMap
  id: Box
  mapPath: /Maps/box.yml

- type: ruinMap
  id: Core
  mapPath: /Maps/core.yml

- type: ruinMap
  id: Fland
  mapPath: /Maps/fland.yml